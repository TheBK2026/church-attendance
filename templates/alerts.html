<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alerts</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    text-align: center;
    font-size: 30px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.alert {
    background: #ffdddd;
    border-left: 5px solid red;
    padding: 10px;
    margin: 5px 0;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>⚠ Attendance Alerts</h1>

<div class="card">

{% if alerts %}

    {% for a in alerts %}
        <div class="alert">
            {{ a[0] }} {{ a[1] }} — Absent {{ a[2] }} times this week
        </div>
    {% endfor %}

{% else %}
    <p>No alerts 🎉</p>
{% endif %}

</div>

</body>
</html>
