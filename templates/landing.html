<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Church Attendance</title>

<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Church Attendance System</h1>

<!-- ================= MAIN MENU ================= -->
<div class="card">

<h2>Choose Class</h2>

{% for c in classes %}
    <a href="/class/{{ c[0] }}">
        <button class="primary">{{ c[1] }}</button>
    </a>
{% endfor %}

</div>


<!-- ================= LOGIN OPTIONS ================= -->
<div class="card">

<h2>Login</h2>

<a href="/login/admin">
    <button class="warning">Admin Login</button>
</a>

<a href="/login/servant">
    <button class="primary">Servant Login</button>
</a>

</div>


<!-- ================= FOOTER ================= -->
<div class="card">

<p style="text-align:center;">
"Let the little children come to me..."<br>
<small>Matthew 19:14</small>
</p>

</div>

</body>
</html>
