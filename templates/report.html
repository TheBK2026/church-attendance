<!DOCTYPE html>
<html>
<head>
    <title>Attendance Report</title>
</head>
<body>

    <h2>Attendance Report</h2>

    <table border="1">
        <tr>
            <th>Kid Name</th>
            <th>Present</th>
            <th>Absent</th>
        </tr>

        {% for r in data %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
